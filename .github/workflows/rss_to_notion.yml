name: RSS to Notion

on:
  schedule:
    # 매일 08:00 KST = 23:00 UTC (전날)
    - cron: "0 23 * * *"
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
        
      - name: Install dependencies
        run: pip install -r requirements.txt
        
      - name: Debug secrets (safe)
        env:
          NOTION_TOKEN: $ {{secrets.NOTION_TOKEN}} 
          NOTION_DATABASE_ID: $ {{secrets.NOTION_DATABASE_ID}} 
        run: |
          echo "TOKEN starts with ntn_: $(echo "$NOTION_TOKEN" | cut -c1-4)"
          echo "TOKEN length: ${#NOTION_TOKEN}"
          echo "DBID length: ${#NOTION_DATABASE_ID}"
          echo "DBID head: ${NOTION_DATABASE_ID:0:8}"
          echo "DBID tail: ${NOTION_DATABASE_ID: -6}"

      - name: Run RSS ingestion
        env:
          NOTION_TOKEN: $ {{secrets.NOTION_TOKEN}} 
          NOTION_DATABASE_ID: $ {{secrets.NOTION_DATABASE_ID}} 
        run: python rss_to_notion.py
